name: trailing-stop-monitor

on:
  schedule:
    # 北京时间周一至周五 15:30（A股收盘后），UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r stock_monitor/requirements.txt

      - name: Run trailing stop monitor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd stock_monitor/trailing
          python monitor.py

      - name: Commit state and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_monitor/trailing/state.yaml stock_monitor/trailing/reports/
          git diff --staged --quiet || git commit -m "trailing stop snapshot $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          git push
