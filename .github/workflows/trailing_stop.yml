name: trailing-stop-monitor

on:
  schedule:
    # 北京时间周一至周五 15:30（A股收盘后），UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'stock_monitor/trailing/**'
      - '.github/workflows/trailing_stop.yml'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r stock_monitor/requirements.txt

      - name: Run trailing stop monitor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd stock_monitor/trailing
          mkdir -p reports
          # Tee all output to a log file so we can debug from the commit
          python -u monitor.py 2>&1 | tee reports/last_run.log
          # propagate python exit code (tee swallows it)
          exit ${PIPESTATUS[0]}
          # Also dump whether the secret was non-empty (length only, never the value)
        # Note: secret length is logged inside monitor.py via os.environ check

      - name: Commit state and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_monitor/trailing/state.yaml stock_monitor/trailing/reports/
          git diff --staged --quiet || git commit -m "trailing stop snapshot $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          git push
