name: A股公告每日监控

on:
  schedule:
    # 北京时间每天早上 7:00 = UTC 前一天 23:00
    - cron: '0 23 * * *'
  workflow_dispatch:   # 允许在 GitHub 网页上手动触发

permissions:
  contents: write      # 允许把报告提交回仓库

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r stock_monitor/requirements.txt

      - name: 运行公告监控
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd stock_monitor
          python main.py

      - name: 提交报告到仓库
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_monitor/reports/
          git diff --staged --quiet || git commit -m "📊 每日公告报告 $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          git push
